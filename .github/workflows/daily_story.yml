name: Publicar Historia Diaria

on:
  schedule:
    # Se ejecuta todos los días a las 12:00 UTC (9:00 AM Argentina)
    - cron: '0 12 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub si quieres

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Instalar dependencias de sistema (Chrome para imágenes)
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Bot de Instagram
      env:
        IG_USERNAME: ${{ secrets.IG_USERNAME }}
        IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
        IG_SESSIONID: ${{ secrets.IG_SESSIONID }}
        # Si tienes 2FA, puedes intentar pasarlo por secreto, 
        # pero es mejor usar el SessionID para evitar bloqueos
      run: python bot.py
