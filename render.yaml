services:
  - type: web
    name: instagram-stories-bot
    env: docker
    plan: free
    region: ohio
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 5000
      - key: IG_USERNAME
        sync: false
      - key: IG_PASSWORD
        sync: false
      - key: IG_SESSIONID
        sync: false
      - key: IG_2FA_CODE
        sync: false
